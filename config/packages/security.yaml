security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Access\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            pattern: ^/
            user_checker: App\Security\AccountStatusUserChecker
            custom_authenticators:
                - App\Security\SessionAuthenticator
            logout:
                path: app_logout
                target: ac_ui_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/exercises, roles: PUBLIC_ACCESS }
        - { path: ^/user, roles: ROLE_USER }

    role_hierarchy:
        ROLE_PATIENT: ROLE_USER
        ROLE_ADMIN: [ROLE_USER, ROLE_PATIENT]

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10